syntax = "proto3";

package auth;

option go_package = "tech-ip-sem2/services/auth/pkg/authpb";

message VerifyRequest {
  string token = 1;
}

message VerifyResponse {
  bool valid = 1;
  string subject = 2;
  string error = 3;
}

service AuthenticationService {
  rpc Verify(VerifyRequest) returns (VerifyResponse);
}
